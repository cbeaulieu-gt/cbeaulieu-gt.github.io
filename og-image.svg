<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>

  <!-- Subtle grid texture — faint horizontal lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Accent bar — left edge -->
  <rect x="72" y="180" width="5" height="270" fill="#3dd68c" rx="3"/>

  <!-- Name -->
  <text
    x="112"
    y="285"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="68"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-1"
  >Christopher M. Beaulieu</text>

  <!-- Title -->
  <text
    x="112"
    y="360"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="400"
    fill="#d4d4d4"
  >Senior Software Engineer</text>

  <!-- Accent URL -->
  <text
    x="112"
    y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="500"
    fill="#3dd68c"
  >christopherbeaulieu.net</text>
</svg>
